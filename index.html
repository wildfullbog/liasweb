<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪐</text></svg>">
    <title>🪐 Lia's Space World</title>
    
    <script>
        let currentRole = 'member';
        const STAFF_PASSWORD = 'lia123'; // Dein Passwort

        // Staff Login direkt über die Hauptseite ausführen
        function triggerStaffLogin() {
            const enteredPw = prompt('Bitte das Staff-Passwort eingeben: 👾');
            if (enteredPw === STAFF_PASSWORD) {
                currentRole = 'staff';
                alert('Erfolgreich als Staff angemeldet! 👾 Die Löschknöpfe sind jetzt aktiv.');
                
                // Status-Tag aktualisieren
                const statusTag = document.getElementById('status-tag');
                if(statusTag) {
                    statusTag.innerHTML = '👾 Staff-Mode';
                    statusTag.style.color = '#ff007f';
                }
                displayComments();
            } else if (enteredPw !== null) {
                alert('Falsches Passwort! ❌');
            }
        }

        function getComments() {
            const comments = localStorage.getItem('lia_comments');
            return comments ? JSON.parse(comments) : [];
        }

        function addComment() {
            const nameInput = document.getElementById('comment-name');
            const textInput = document.getElementById('comment-text');
            
            if (!nameInput || !textInput || !nameInput.value.trim() || !textInput.value.trim()) {
                alert('Bitte fülle beide Felder aus! 🌸');
                return;
            }

            const comments = getComments();
            const newComment = {
                id: Date.now(),
                user: nameInput.value.trim(),
                text: textInput.value.trim()
            };

            comments.push(newComment);
            localStorage.setItem('lia_comments', JSON.stringify(comments));
            
            textInput.value = ''; 
            displayComments();
        }

        function deleteComment(id) {
            let comments = getComments();
            comments = comments.filter(c => c.id !== id);
            localStorage.setItem('lia_comments', JSON.stringify(comments));
            displayComments();
        }

        function displayComments() {
            const display = document.getElementById('comments-display');
            if(!display) return;
            display.innerHTML = '';
            const comments = getComments();

            if (comments.length === 0) {
                display.innerHTML = '<p style="text-align:center; color:#888;">Noch keine Kommentare da. Schreib den ersten! 💖</p>';
                return;
            }

            comments.forEach(comment => {
                const commentEl = document.createElement('div');
                commentEl.classList.add('single-comment');
                
                const deleteBtnHtml = currentRole === 'staff' 
                    ? `<button class="delete-btn" style="display:block;" onclick="deleteComment(${comment.id})">Löschen ❌</button>` 
                    : '';

                commentEl.innerHTML = `
                    <div>
                        <div class="comment-user">👤 ${comment.user}</div>
                        <div class="comment-text">${comment.text}</div>
                    </div>
                    ${deleteBtnHtml}
                `;
                display.appendChild(commentEl);
            });
        }

        // Live-Status Kontrolleur
        window.addEventListener('load', () => {
            const statusIndicator = document.getElementById('live-status-indicator');
            if (statusIndicator) {
                statusIndicator.innerHTML = '<span class="status-dot ready"></span> Online & Bereit';
                statusIndicator.style.boxShadow = '0 0 15px rgba(46, 204, 113, 0.4)';
            }
            displayComments();
        });
    </script>

    <style>

            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

        @keyframes pulse-green { 0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); } 100% { transform: scale(1.1); box-shadow: 0 0 10px 4px rgba(46, 204, 113, 0); } }

        .heart-particle {

        .discord-box {

            width: 100%; padding: 15px 25px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.8);
