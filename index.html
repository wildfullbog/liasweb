<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://w3.org' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪐</text></svg>">
    <title>🪐 Lia's Space World</title>
    <style>
        /* Hochwertiger, galaktischer Cyber-Pink-Verlauf */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #120c1f 0%, #2a1b40 40%, #4a1c3e 70%, #1a0a2a 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Langsam fallende Hintergrund-Elemente */
        .heart-bg {
            position: fixed;
            font-size: 1.8rem;
            opacity: 0.15;
            z-index: 1;
            animation: floatDown 10s infinite linear;
            pointer-events: none;
        }

        @keyframes floatDown {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.2; }
            90% { opacity: 0.2; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Unzerstörbarer, wunderschöner Herz-Maus-Schweif */
        .sparkle-trail {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 1.6rem;
            line-height: 1;
            animation: particleFade 0.5s ease-out forwards;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff007f;
            user-select: none;
        }

        @keyframes particleFade {
            0% { transform: translate(-50%, -50%) scale(0.6) translateY(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.4) translateY(-20px); opacity: 0; }
        }

        /* Luxus Glasmorphism Header */
        header {
            width: 90%;
            max-width: 1000px;
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 18px 35px;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(255, 0, 127, 0.2), inset 0 1px 0 rgba(255,255,255,0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            z-index: 10;
        }

        .logo {
            font-weight: 900;
            font-size: 1.6rem;
            color: #fff;
            text-shadow: 0 0 15px #ff007f, 0 0 30px #ff00ff;
            letter-spacing: 1px;
        }

        nav a {
            margin-left: 25px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 800;
            font-size: 1.05rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        nav a:hover {
            color: #ff007f;
            text-shadow: 0 0 15px #ff007f;
            transform: scale(1.15);
        }

        /* Inhalts-Container */
        .main-content {
            max-width: 760px;
            width: 90%;
            margin: 40px auto;
            z-index: 10;
        }

        /* High-End Cyber-Glas-Karten */
        .card {
            background: rgba(20, 10, 35, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 45px;
            box-shadow: 0 25px 65px rgba(255, 20, 147, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 50px 45px;
            margin-bottom: 40px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 35px 80px rgba(255, 20, 147, 0.45);
            background: rgba(30, 15, 50, 0.75);
        }

        h1 {
            font-size: 3.8rem;
            margin: 0 0 20px 0;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        h1 span, h2 span, h3 span {
            background: linear-gradient(45deg, #ff007f, #ff00ff, #00d2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h2 { font-size: 2.5rem; margin-top: 0; font-weight: 900; color: #ffffff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        p { font-size: 1.3rem; line-height: 1.8; color: #e0e0e0; margin-bottom: 35px; font-weight: 600; text-shadow: 0 2px 5px rgba(0,0,0,0.4); }

        /* Discord Premium Banner */
        .discord-box {
            background: linear-gradient(135deg, #5865F2, #7289DA);
            color: white;
            border-radius: 30px;
            padding: 22px;
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 12px 30px rgba(88, 101, 242, 0.4);
        }

        .discord-info { display: flex; align-items: center; gap: 15px; text-align: left; }
        .discord-name { font-size: 1.4rem; font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }

        /* Steckbrief-Raster */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.07);
            padding: 22px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: left;
            transition: transform 0.2s;
        }
        .info-item:hover { transform: scale(1.03); background: rgba(255, 255, 255, 0.12); }

        .info-label { font-size: 0.9rem; color: #ff007f; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; text-shadow: 0 0 10px rgba(255, 0, 127, 0.5); }
        .info-value { font-size: 1.35rem; font-weight: 800; color: #ffffff; }
        
        /* Neon Gaming Tags */
        .game-tag { 
            display: inline-block; 
            background: linear-gradient(135deg, #74b9ff, #a29bfe); 
            color: white; 
            padding: 12px 24px; 
            border-radius: 25px; 
            font-weight: 800; 
            margin: 6px; 
            font-size: 1.05rem;
            box-shadow: 0 5px 18px rgba(162, 155, 254, 0.4); 
            transition: all 0.3s;
        }
        .game-tag:hover { transform: scale(1.1) rotate(2deg); box-shadow: 0 8px 25px rgba(162, 155, 254, 0.6); }

        /* Satter Cyber-Button */
        .btn {
            display: inline-block;
            padding: 18px 45px;
            background: linear-gradient(45deg, #ff007f, #ff00ff);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.25rem;
            box-shadow: 0 10px 30px rgba(255, 0, 127, 0.5);
            transition: all 0.3s ease;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 15px 40px rgba(255, 0, 127, 0.7); }

        /* Interaktives Axolotl-Haustier */
        #pet-axolotl {
            position: fixed;
            bottom: 25px; right: 25px;
            font-size: 3.8rem;
            cursor: pointer;
            z-index: 999;
            transition: transform 0.2s;
            user-select: none;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }
        #pet-axolotl:active { transform: scale(1.3); }

        footer { margin-top: auto; padding: 45px; font-size: 1.1rem; color: #fff; font-weight: 800; text-shadow: 0 2px 6px rgba(255, 0, 127, 0.5); z-index: 10; }
    </style>
</head>
