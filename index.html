<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://w3.org' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪐</text></svg>">
    <title>🪐 Lia's Space World</title>
    <style>
        /* Hochwertiger, galaktischer Cyber-Pink-Verlauf */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #120c1f 0%, #2a1b40 40%, #4a1c3e 70%, #1a0a2a 100%);
            background-attachment: fixed;
            min-height: 100vh; color: #ffffff;
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }

        /* Langsam fallende Hintergrund-Elemente */
        .heart-bg {
            position: fixed; font-size: 1.8rem; opacity: 0.15; z-index: 1;
            animation: floatDown 10s infinite linear; pointer-events: none;
        }
        @keyframes floatDown {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.2; }
            90% { opacity: 0.2; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Wunderschöner Herz-Maus-Schweif */
        .sparkle-trail {
            position: fixed; pointer-events: none; z-index: 9999; font-size: 1.6rem; line-height: 1;
            animation: particleFade 0.5s ease-out forwards; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff007f;
            user-select: none;
        }
        @keyframes particleFade {
            0% { transform: translate(-50%, -50%) scale(0.6) translateY(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.4) translateY(-20px); opacity: 0; }
        }

        /* Status Anzeige oben rechts */
        .status-container {
            position: fixed; top: 20px; right: 20px; z-index: 999;
        }
        .status-box {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 10px 22px; border-radius: 50px; font-weight: 800; font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; gap: 10px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2); color: #74b9ff;
        }

        /* Luxus Glasmorphism Header */
        header {
            width: 90%; max-width: 1000px; margin-top: 25px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 18px 35px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 10;
            box-shadow: 0 10px 40px rgba(255, 0, 127, 0.2), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .logo { font-weight: 900; font-size: 1.6rem; color: #fff; text-shadow: 0 0 15px #ff007f, 0 0 30px #ff00ff; letter-spacing: 1px; }
        nav a { margin-left: 25px; text-decoration: none; color: #ffffff; font-weight: 800; font-size: 1.05rem; transition: all 0.3s ease; }
        nav a:hover { color: #ff007f; text-shadow: 0 0 15px #ff007f; transform: scale(1.15); }

        .main-content { max-width: 760px; width: 90%; margin: 40px auto; z-index: 10; }
        .card {
            background: rgba(20, 10, 35, 0.7); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 45px; border: 1px solid rgba(255, 255, 255, 0.15); padding: 50px 45px; margin-bottom: 40px;
            text-align: center; box-shadow: 0 25px 65px rgba(255, 20, 147, 0.25); transition: all 0.4s ease;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 35px 80px rgba(255, 20, 147, 0.45); background: rgba(30, 15, 50, 0.75); }

        h1 { font-size: 3.8rem; margin: 0 0 20px 0; font-weight: 900; color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        h1 span, h2 span, h3 span { background: linear-gradient(45deg, #ff007f, #ff00ff, #00d2ff); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        @keyframes shine { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        h2 { font-size: 2.5rem; margin-top: 0; font-weight: 900; color: #ffffff; }
        p { font-size: 1.3rem; line-height: 1.8; color: #e0e0e0; margin-bottom: 35px; font-weight: 600; }

        .discord-box {
            background: linear-gradient(135deg, #5865F2, #7289DA); color: white; border-radius: 30px;
            padding: 22px; margin-top: 30px; display: flex; align-items: center; justify-content: space-between;
        }
        .discord-info { display: flex; align-items: center; gap: 15px; text-align: left; }
        .discord-name { font-size: 1.4rem; font-weight: 900; }

        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; }
        .info-item { background: rgba(255, 255, 255, 0.07); padding: 22px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.15); text-align: left; }
        .info-label { font-size: 0.9rem; color: #ff007f; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
        .info-value { font-size: 1.35rem; font-weight: 800; color: #ffffff; }
        
        .game-tag { 
            display: inline-block; background: linear-gradient(135deg, #74b9ff, #a29bfe); color: white; 
            padding: 12px 24px; border-radius: 25px; font-weight: 800; margin: 6px; font-size: 1.05rem;
            box-shadow: 0 5px 18px rgba(162, 155, 254, 0.4); 
        }

        .btn {
            display: inline-block; padding: 18px 45px; background: linear-gradient(45deg, #ff007f, #ff00ff);
            color: white; text-decoration: none; border-radius: 50px; font-weight: 900; font-size: 1.25rem;
            box-shadow: 0 10px 30px rgba(255, 0, 127, 0.5); transition: all 0.3s ease;
        }

        /* Kommentarsystem Style */
        .comment-input-box { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .comment-input {
            width: 100%; padding: 15px 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.07); font-size: 1.1rem; font-weight: 600; outline: none; box-sizing: border-box; color: #fff;
        }
        .comment-input::placeholder { color: #aaa; }
        .comment-submit-btn {
            background: linear-gradient(45deg, #ff007f, #ff00ff); color: white; border: none;
            padding: 16px; border-radius: 50px; font-weight: 900; font-size: 1.15rem; cursor: pointer; transition: 0.2s;
            box-shadow: 0 5px 15px rgba(255,0,127,0.3);
        }
        .comment-submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,0,127,0.6); }
        
        .comments-list { text-align: left; display: flex; flex-direction: column; gap: 15px; }
        .single-comment {
            background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center;
        }
        .comment-user { font-weight: 900; color: #ff007f; font-size: 1.1rem; margin-bottom: 5px; }
        .comment-text { font-weight: 600; color: #eee; font-size: 1.1rem; }
        
        .delete-btn {
            background: #ff3838; color: white; border: none; padding: 8px 15px;
            border-radius: 15px; font-weight: 800; cursor: pointer; display: none;
        }
        .delete-btn:hover { background: #cf2121; }

        .staff-trigger-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.15);
            color: #aaa; padding: 10px 25px; border-radius: 50px; cursor: pointer;
            font-weight: 700; font-size: 0.85rem; margin-bottom: 20px; transition: 0.2s;
        }
        .staff-trigger-btn:hover { background: rgba(255, 0, 127, 0.2); border-color: #ff007f; color: #fff; }

        #pet-axolotl { position: fixed; bottom: 25px; right: 25px; font-size: 3.8rem; cursor: pointer; z-index: 999; user-select: none; }
        footer { margin-top: auto; padding: 45px; font-size: 1.1rem; color: #fff; font-weight: 800; z-index: 10; }
    </style>
    
    <!-- Die Logik-Skripte für die Kommentare krisensicher im Head -->
    <script>
        let currentRole = 'member';
        const STAFF_PASSWORD = 'lia123'; // Admin-Passwort

        function triggerStaffLogin() {
            const enteredPw = prompt('Bitte das Staff-Passwort eingeben: 👾');
            if (enteredPw === STAFF_PASSWORD) {
                currentRole = 'staff';
                alert('Erfolgreich als Staff angemeldet! 👾 Die Löschknöpfe sind aktiv.');
                
                const statusTag = document.getElementById('role-tag');
                if(statusTag) {
                    statusTag.innerHTML = '👾 Staff-Mode';
                    statusTag.style.color = '#ff007f';
                }
                displayComments();
            } else if (enteredPw !== null) {
                alert('Falsches Passwort! ❌');
            }
        }

        function getComments() {
            const comments = localStorage.getItem('lia_comments');
            return comments ? JSON.parse(comments) : [];
        }

        function addComment() {
            const nameInput = document.getElementById('comment-name');
            const textInput = document.getElementById('comment-text');
            
            if (!nameInput || !textInput || !nameInput.value.trim() || !textInput.value.trim()) {
                alert('Bitte fülle beide Felder aus! 🌸');
                return;
