<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪐</text></svg>">
    <title>🪐 Lia's Space World</title>
    <style>
        /* Cyber-Pink Space Verlauf */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 35%, #fecfef 65%, #74b9ff 100%);
            background-attachment: fixed;
            min-height: 100vh; color: #2d3436;
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }

        /* Rollen-Auswahl-Overlay (Staff / Member Login) */
        #role-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(20, 10, 35, 0.85); backdrop-filter: blur(20px);
            z-index: 10000; display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.7); border-radius: 35px;
            padding: 40px; text-align: center; max-width: 400px; width: 90%;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 50px rgba(255, 0, 127, 0.3);
        }
        .login-box h2 { margin-top: 0; color: #ff007f; font-weight: 900; }
        .role-btn {
            display: block; width: 100%; padding: 15px; margin: 15px 0;
            border-radius: 50px; border: none; font-weight: 800; font-size: 1.1rem;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-member { background: linear-gradient(45deg, #ff7eb3, #74b9ff); color: white; }
        .btn-staff { background: linear-gradient(45deg, #ff007f, #ff00ff); color: white; }
        .role-btn:hover { transform: scale(1.04); box-shadow: 0 5px 15px rgba(255, 0, 127, 0.4); }
        
        #staff-password-section { display: none; margin-top: 20px; }
        .input-field {
            width: 80%; padding: 12px 20px; border-radius: 50px;
            border: 2px solid #ff007f; font-size: 1rem; text-align: center; outline: none;
        }

        /* Status-Anzeige oben rechts */
        #status-tag {
            position: fixed; top: 20px; right: 20px; background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px); padding: 8px 20px; border-radius: 50px;
            font-weight: 800; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.5); z-index: 999;
        }

        /* Hintergrund-Partikel */
        .heart-particle {
            position: fixed; top: -10%; font-size: 24px;
            pointer-events: none; animation: fall linear infinite; z-index: 1; opacity: 0.65;
        }

        /* Herz-Cursor-Schweif */
        .sparkle-trail {
            position: fixed; pointer-events: none; z-index: 9999; font-size: 1.5rem; line-height: 1;
            animation: particleFade 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff007f; user-select: none;
        }

        @keyframes fall { 0% { transform: translateY(0) rotate(0deg); opacity: 0.8; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        @keyframes particleFade { 0% { transform: translate(-50%, -50%) scale(0.6); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.4) translateY(-30px); opacity: 0; } }

        /* Luxus Header & Karten */
        header {
            width: 90%; max-width: 1000px; margin-top: 25px;
            background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 18px 35px; border-radius: 50px; border: 2px solid rgba(255, 255, 255, 0.7);
            display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 10;
            box-shadow: 0 10px 40px rgba(255, 0, 127, 0.25);
        }
        .logo { font-weight: 900; font-size: 1.6rem; color: #fff; text-shadow: 0 0 15px #ff007f, 0 0 30px #ff00ff; }
        nav a { margin-left: 25px; text-decoration: none; color: #ffffff; font-weight: 800; font-size: 1.05rem; transition: all 0.3s; }
        nav a:hover { color: #ff007f; transform: scale(1.15); }

        .main-content { max-width: 760px; width: 90%; margin: 40px auto; z-index: 10; }
        .card {
            background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 45px; border: 2px solid rgba(255, 255, 255, 0.8); padding: 50px 45px; margin-bottom: 40px;
            text-align: center; box-shadow: 0 25px 65px rgba(255, 20, 147, 0.2);
        }

        h1 { font-size: 3.8rem; margin: 0 0 20px 0; font-weight: 900; color: #fff; }
        h1 span, h2 span, h3 span { background: linear-gradient(45deg, #ff007f, #ff00ff, #00d2ff); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h2 { font-size: 2.5rem; margin-top: 0; font-weight: 900; color: #2d3436; }
        p { font-size: 1.3rem; line-height: 1.8; color: #444; margin-bottom: 35px; font-weight: 600; }

        /* Discord Banner */
        .discord-box {
            background: linear-gradient(135deg, #5865F2, #7289DA); color: white; border-radius: 30px;
            padding: 22px; margin-top: 30px; display: flex; align-items: center; justify-content: space-between;
        }
        .discord-info { display: flex; align-items: center; gap: 15px; text-align: left; }
        .discord-name { font-size: 1.4rem; font-weight: 900; }

        /* Steckbrief */
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; }
        .info-item { background: rgba(255, 255, 255, 0.45); padding: 22px; border-radius: 25px; border: 2px solid rgba(255, 255, 255, 0.6); text-align: left; }
        .info-label { font-size: 0.9rem; color: #ff007f; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }
        .info-value { font-size: 1.35rem; font-weight: 800; color: #1e272e; }
        .game-tag { display: inline-block; background: linear-gradient(135deg, #74b9ff, #a29bfe); color: white; padding: 12px 24px; border-radius: 25px; font-weight: 800; margin: 6px; box-shadow: 0 5px 18px rgba(162, 155, 254, 0.4); }

        /* --- KOMMENTARBEREICH STYLE --- */
        .comment-input-box { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .comment-input {
            width: 100%; padding: 15px 25px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.5); font-size: 1.1rem; font-weight: 600; outline: none; box-sizing: border-box;
        }
        .comment-submit-btn {
            background: linear-gradient(45deg, #ff007f, #ff00ff); color: white; border: none;
            padding: 15px; border-radius: 50px; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.2s;
        }
        .comment-submit-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,0,127,0.4); }
        
        .comments-list { text-align: left; display: flex; flex-direction: column; gap: 15px; }
        .single-comment {
            background: rgba(255, 255, 255, 0.5); padding: 20px; border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.6); display: flex; justify-content: space-between; align-items: center;
        }
        .comment-user { font-weight: 900; color: #ff007f; font-size: 1.1rem; margin-bottom: 5px; }
        .comment-text { font-weight: 600; color: #2d3436; font-size: 1.1rem; }
        
        .delete-btn {
            background: #ff3838; color: white; border: none; padding: 8px 15px;
            border-radius: 15px; font-weight: 800; cursor: pointer; display: none; /* Am Anfang unsichtbar, nur für Staff */
        }
        .delete-btn:hover { background: #cf2121; }

        #pet-axolotl { position: fixed; bottom: 25px; right: 25px; font-size: 3.8rem; cursor: pointer; z-index: 999; user-select: none; }
        footer { margin-top: auto; padding: 45px; font-size: 1.1rem; color: #fff; font-weight: 800; text-shadow: 0 2px 6px rgba(255, 0, 127, 0.5); z-index: 10; }
    </style>
</head>
<body>

    <!-- Rollen-Auswahl-Overlay -->
    <div id="role-overlay">
        <div class="login-box">
            <h2>Wähle deine Rolle ✨</h2>
            <p>Wie möchtest du Lia's Website betreten?</p>
            <button class="role-btn btn-member" onclick="selectRole('member')">Als Member beitreten 👑</button>
            <button class="role-btn btn-staff" onclick="showStaffLogin()">Als Staff einloggen 👾</button>
            
            <div id="staff-password-section">
                <input type="password" id="staff-password" class="input-field" placeholder="Staff-Passwort eingeben">
                <button class="role-btn btn-staff" style="margin-top: 10px; padding: 10px;" onclick="verifyStaff()">Login</button>
            </div>
        </div>
    </div>

    <!-- Live Status Anzeige -->
    <div id="status-tag">Rolle: Lädt...</div>

    <div id="pet-axolotl" onclick="petMe()">🦎</div>
    <div id="heart-container"></div>

    <header>
        <div class="logo">💖 LIA'S AXOLOTL WORLD</div>
        <nav>
            <a href="#home">Home</a>
            <a href="#about">Über mich</a>
            <a href="#comments">Gästebuch 🌸</a>
        </nav>
    </header>

    <div class="main-content">
        
        <div class="card" id="home">
            <h1>Hi, ich bin <span>Lia</span>! 🦎</h1>
            <p>Willkommen in meiner pinken Cyber-Oase! Ich liebe Gaming, guten Style und natürlich Axolotl. Schön, dass du da bist! 🌸</p>
