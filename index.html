<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://w3.org' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪐</text></svg>">
    <title>Gästebuch</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #120c1f 0%, #2a1b40 40%, #4a1c3e 70%, #1a0a2a 100%);
            background-attachment: fixed;
            min-height: 100vh; color: #ffffff;
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }
        .sparkle-trail {
            position: fixed; pointer-events: none; z-index: 9999; font-size: 1.5rem;
            animation: particleFade 0.5s ease-out forwards;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff007f;
        }
        @keyframes particleFade {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.4) translateY(-20px); opacity: 0; }
        }
        .status-box {
            position: fixed; top: 20px; right: 20px; z-index: 999;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(15px);
            padding: 10px 22px; border-radius: 50px; font-weight: 800; font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.15); color: #74b9ff;
        }
        header {
            width: 90%; max-width: 1000px; margin-top: 25px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            padding: 18px 35px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;
            z-index: 10;
        }
        .logo { font-weight: 900; font-size: 1.6rem; text-shadow: 0 0 15px #ff007f; }
        nav a { margin-left: 25px; text-decoration: none; color: #ffffff; font-weight: 800; }
        nav a:hover { color: #ff007f; }
        
        .main-content { max-width: 760px; width: 90%; margin: 40px auto; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        
        /* REPARIERT: Höhe ist jetzt "auto" damit nichts mehr abgeschnitten wird */
        .card {
            width: 100%;
            height: auto;
            min-height: 350px;
            background: rgba(20, 10, 35, 0.7); backdrop-filter: blur(30px);
            border-radius: 45px; border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 50px 45px; margin-bottom: 40px; text-align: center;
            box-shadow: 0 25px 65px rgba(255, 20, 147, 0.25);
            box-sizing: border-box;
        }
        h2 { font-size: 2.5rem; margin-top: 0; font-weight: 900; }
        h2 span { background: linear-gradient(45deg, #ff007f, #ff00ff, #00d2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1.3rem; line-height: 1.8; color: #e0e0e0; margin-bottom: 35px; }
        
        .comment-input-box { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; width: 100%; }
        .comment-input {
            width: 100%; padding: 15px 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.07); font-size: 1.1rem; font-weight: 600; outline: none; box-sizing: border-box; color: #fff;
        }
        .comment-submit-btn {
            width: 100%; padding: 16px; border-radius: 50px; font-weight: 900; font-size: 1.15rem; cursor: pointer;
            background: linear-gradient(45deg, #ff007f, #ff00ff); color: white; border: none;
            box-shadow: 0 5px 15px rgba(255, 0, 127, 0.3); transition: all 0.2s;
        }
        .comment-submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 0, 127, 0.5); }
        
        .comments-list { width: 100%; margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        .single-comment {
            background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; text-align: left;
        }
        .comment-user-box { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .comment-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
        .comment-user { font-weight: 900; color: #ff007f; }
        .comment-text { color: #eee; font-size: 1.1rem; }
        
        .delete-btn { background: #ff3838; color: white; border: none; padding: 8px 15px; border-radius: 15px; font-weight: 800; cursor: pointer; display: none; }
        .delete-btn:hover { background: #cf2121; }
        
        .staff-trigger-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.15); color: #aaa; padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: 700; transition: all 0.2s; margin-top: 10px; }
        .staff-trigger-btn:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }
        
        /* Das Haustier wurde aus dem Layout genommen und fest unten rechts angeheftet */
        #pet-axolotl { position: fixed; bottom: 25px; right: 25px; font-size: 3.8rem; cursor: pointer; z-index: 999; user-select: none; }
    </style>
</head>
<body>

    <div id="role-tag" class="status-box">👑 Member</div>
    <div id="pet-axolotl">🦎</div>

    <header>
        <div class="logo">🌸 LIA'S GÄSTEBUCH</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="kommentare.html">Gästebuch</a>
        </nav>
    </header>

    <div class="main-content">
        <div class="card">
            <h2><span>Community Gästebuch</span> 🌸</h2>
            <p>Schreibe mir oder meinen Besuchern eine nette Nachricht!</p>
            
            <div class="comment-input-box">
                <input type="text" id="comment-name" class="comment-input" placeholder="Dein Name...">
                <input type="text" id="comment-text" class="comment-input" placeholder="Schreibe eine Nachricht...">
                <button class="comment-submit-btn" id="send-comment-btn">Absenden ✨</button>
            </div>
            
            <div id="comments-display" class="comments-list"></div>
        </div>

        <button class="staff-trigger-btn" id="login-admin-btn">Staff Login 👾</button>
    </div>

    <script>
        let currentRole = 'member';
        const STAFF_PASSWORD = 'lia123';

        window.addEventListener('DOMContentLoaded', () => {
            const loginBtn = document.getElementById('login-admin-btn');
            const sendBtn = document.getElementById('send-comment-btn');
            const petBtn = document.getElementById('pet-axolotl');

            if (loginBtn) {
                loginBtn.addEventListener('click', () => {
                    const enteredPw = prompt('Staff-Passwort eingeben:');
                    if (enteredPw === STAFF_PASSWORD) {
                        currentRole = 'staff';
                        const roleTag = document.getElementById('role-tag');
                        if (roleTag) {
                            roleTag.innerHTML = '👾 Staff-Mode';
                            roleTag.style.color = '#ff007f';
                        }
                        displayComments();
                    } else if (enteredPw !== null) { 
                        alert('Falsch! ❌'); 
                    }
                });
            }

            if (sendBtn) {
                sendBtn.addEventListener('click', () => {
                    const n = document.getElementById('comment-name');
                    const t = document.getElementById('comment-text');
                    if (!n || !t || !n.value.trim() || !t.value.trim()) return;

                    const profile = localStorage.getItem('lia_user_profile');
                    let userPic = '';
                    if (profile) { userPic = JSON.parse(profile).picture; }

                    const comments = getComments();
                    comments.push({ 
                        id: Date.now(), 
                        user: n.value.trim(), 
                        text: t.value.trim(),
                        avatar: userPic
                    });
                    localStorage.setItem('lia_comments', JSON.stringify(comments));
                    t.value = ''; 
                    displayComments();
                });
            }

            if (petBtn) {
                petBtn.addEventListener('click', () => {
                    petBtn.innerText = '🌸'; 
                    setTimeout(() => { petBtn.innerText = '🦎'; }, 500);
                });
            }

            checkUserLogin();
            displayComments();
        });

        function getComments() {
            const c = localStorage.getItem('lia_comments');
            return c ? JSON.parse(c) : [];
        }

        function removeComment(id) {
            let comments = getComments().filter(c => c.id !== id);
            localStorage.setItem('lia_comments', JSON.stringify(comments));
            displayComments();
        }

        function displayComments() {
            const display = document.getElementById('comments-display');
            if (!display) return; 
            display.innerHTML = '';
            const comments = getComments();

            if (comments.length === 0) {
                display.innerHTML = '<p style="color:#aaa; text-align:center;">💕 Noch keine Einträge da...</p>';
                return;
            }

            comments.forEach(c => {
                const div = document.createElement('div');
                div.classList.add('single-comment');
                
                const avatarHtml = c.avatar
